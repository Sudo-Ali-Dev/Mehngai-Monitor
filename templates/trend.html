<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ item_name }} Trends</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Plotly via CDN -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: { 'fade-in': 'fadeIn 0.3s ease-out' },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white text-zinc-900 antialiased min-h-screen selection:bg-zinc-900 selection:text-white">

<!-- Header -->
<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-zinc-200">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center h-14 gap-4">
            <a href="/?category={{ category }}" 
               class="text-zinc-500 hover:text-zinc-900 transition-colors">
                <i class="ph ph-arrow-left text-lg"></i>
            </a>
            <div>
                <h1 class="text-base font-bold tracking-tight text-zinc-900 leading-none">
                    Price Trends
                </h1>
            </div>
            <div class="ml-auto text-xs font-medium text-zinc-500 uppercase tracking-wider bg-zinc-100 px-2 py-1 rounded">
                {{ category }}
            </div>
        </div>
    </div>
</header>

<main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10 animate-fade-in">
    
    <div class="mb-8">
        <h2 class="text-2xl font-bold text-zinc-900 tracking-tight">{{ item_name }}</h2>
        <p class="text-sm font-medium text-zinc-500 mt-1">Historical rates over time</p>
    </div>

    <div>
        {% if history %}
            <div class="border border-zinc-200 rounded-lg p-2 sm:p-4">
                <div id="chart" class="w-full h-[500px]"></div>
            </div>
            
            <script>
                const historyData = [
                    {% for row in history %}
                        {
                            "date": "{{ row.date }}",
                            "min_price": {{ row.min_price if row.min_price else 'null' }},
                            "max_price": {{ row.max_price if row.max_price else 'null' }}
                        }{% if not loop.last %},{% endif %}
                    {% endfor %}
                ];

                const dates = historyData.map(d => d.date);
                const price1 = historyData.map(d => d.min_price);
                const price2 = historyData.map(d => d.max_price);

                const trace1 = {
                    x: dates,
                    y: price1,
                    name: 'Price 1',
                    type: 'scatter',
                    mode: 'lines+markers',
                    line: {
                        color: '#18181b', /* zinc-900 */
                        width: 2,
                        shape: 'spline' 
                    },
                    marker: {
                        color: '#18181b',
                        size: 6,
                        symbol: 'circle'
                    },
                    hovertemplate: '<b>Rs %{y}</b><br>%{x}<extra></extra>'
                };

                const trace2 = {
                    x: dates,
                    y: price2,
                    name: 'Price 2',
                    type: 'scatter',
                    mode: 'lines+markers',
                    line: {
                        color: '#a1a1aa', /* zinc-400 */
                        width: 2,
                        dash: 'dot',
                        shape: 'spline'
                    },
                    marker: {
                        color: '#a1a1aa',
                        size: 6,
                        symbol: 'circle-open'
                    },
                    hovertemplate: '<b>Rs %{y}</b><br>%{x}<extra></extra>'
                };

                const layout = {
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    font: {
                        family: 'Inter, sans-serif',
                        color: '#52525b' /* zinc-500 */
                    },
                    xaxis: { 
                        showgrid: false,
                        zeroline: false,
                        tickfont: { color: '#a1a1aa' },
                        tickangle: -45
                    },
                    yaxis: { 
                        title: { text: 'Price (Rs {{ "per " + unit if unit else "" }})', font: { size: 12, color: '#a1a1aa' } },
                        gridcolor: '#f4f4f5', /* zinc-100 */
                        gridwidth: 1,
                        zeroline: false,
                        tickfont: { color: '#71717a' }
                    },
                    hovermode: 'x unified',
                    hoverlabel: {
                        bgcolor: 'rgba(24,24,27,0.95)', /* dark hover label */
                        font: { family: 'Inter, sans-serif', color: '#ffffff' },
                        bordercolor: 'transparent'
                    },
                    margin: { t: 20, l: 50, r: 20, b: 60 },
                    legend: { 
                        orientation: 'h', 
                        y: -0.2,
                        x: 0.5,
                        xanchor: 'center',
                        font: { size: 12, color: '#52525b' }
                    }
                };

                const config = { 
                    responsive: true, 
                    displayModeBar: false 
                };

                {% if category == 'poultry' %}
                Plotly.newPlot('chart', [trace1], layout, config);
                {% else %}
                Plotly.newPlot('chart', [trace1, trace2], layout, config);
                {% endif %}
            </script>
        {% else %}
            <div class="py-16 text-center border border-zinc-200 rounded-lg bg-zinc-50/30">
                <h3 class="text-sm font-medium text-zinc-900">No Historical Data</h3>
                <p class="mt-1 text-sm text-zinc-500 mb-6">We don't have enough data points yet.</p>
                <a href="/?category={{ category }}" class="text-sm font-medium text-zinc-900 bg-white border border-zinc-200 px-4 py-2 rounded-md hover:bg-zinc-50">
                    Go back to rates
                </a>
            </div>
        {% endif %}
    </div>
    
    <!-- Footer -->
    <footer class="mt-20 border-t border-zinc-200 pt-8 pb-12 flex justify-between items-center text-xs text-zinc-500">
        <p>Lahore Market Monitor</p>
        <p>Built by Muhammad Ali with Python & FastAPI</p>
    </footer>

</main>
</body>
</html>
